apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-worker
  namespace: yelp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-worker
  template:
    metadata:
      labels:
        app: user-worker
    spec:
      containers:
        - name: user-worker
          image: 896241235820.dkr.ecr.us-east-1.amazonaws.com/yelp-user-worker:lab-latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: yelp-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
