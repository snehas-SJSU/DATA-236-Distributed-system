server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Single-page app shell: never cache, so new builds load immediately
    # (hashed .js/.css can stay immutable long-term in their own block below)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # Uploads: each API pod has its own disk on EKS (emptyDir). Route by filename prefix.
    # Local k8s with one shared RWX volume still works (any backend can serve the file).
    location ~ ^/uploads/review_ {
        proxy_pass http://review-service:8004;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location ~ ^/uploads/profile_ {
        proxy_pass http://user-service:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location ~ ^/uploads/rest_ {
        proxy_intercept_errors on;
        proxy_pass http://restaurant-service:8003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        error_page 404 = @uploads_rest_owner_fallback;
    }
    location @uploads_rest_owner_fallback {
        internal;
        proxy_pass http://owner-service:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location ~ ^/uploads/ {
        proxy_pass http://user-service:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # User auth
    location /auth/user/ {
        proxy_pass http://user-service:8001/auth/user/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Owner auth
    location /auth/owner/ {
        proxy_pass http://owner-service:8002/auth/owner/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # User profile, preferences, history
    location /user/ {
        proxy_pass http://user-service:8001/user/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Owner dashboard and restaurant management
    location /owner/ {
        proxy_pass http://owner-service:8002/owner/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # AI assistant (Sparky)
    location /ai-assistant/ {
        proxy_pass http://restaurant-service:8003/ai-assistant/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Review CRUD and photo uploads (/reviews/:id)
    location /reviews/ {
        proxy_pass http://review-service:8004/reviews/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Restaurant reviews (/restaurants/:id/reviews) — must be before /restaurants/
    location ~ ^/restaurants/[^/]+/reviews {
        proxy_pass http://review-service:8004;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Restaurants — search, details, favorites, photos
    location /restaurants {
        proxy_pass http://restaurant-service:8003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # React Router — serve index.html for all other routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
