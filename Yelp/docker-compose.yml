services:

  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: yelp-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: yelp_db
    networks:
      - yelp-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Kafka (KRaft mode — no Zookeeper needed in Kafka 3.x+) ───────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: yelp-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://kafka:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    networks:
      - yelp-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── User / Reviewer Service (port 8001) ────────────────────────────────────
  user-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.user_service
    container_name: yelp-user-service
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8001:8001"
    environment:
      MONGO_URL: mongodb://mongodb:27017
      DATABASE_NAME: yelp_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SECRET_KEY: ${SECRET_KEY:-your_super_secret_key_change_this_in_production}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - yelp-network

  # ── Restaurant Owner Service (port 8002) ───────────────────────────────────
  owner-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.owner_service
    container_name: yelp-owner-service
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8002:8002"
    environment:
      MONGO_URL: mongodb://mongodb:27017
      DATABASE_NAME: yelp_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SECRET_KEY: ${SECRET_KEY:-your_super_secret_key_change_this_in_production}
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - yelp-network

  # ── Restaurant Service (port 8003) ─────────────────────────────────────────
  restaurant-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.restaurant_service
    container_name: yelp-restaurant-service
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8003:8003"
    environment:
      MONGO_URL: mongodb://mongodb:27017
      DATABASE_NAME: yelp_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SECRET_KEY: ${SECRET_KEY:-your_super_secret_key_change_this_in_production}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - yelp-network

  # ── Review Service (port 8004) ─────────────────────────────────────────────
  review-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.review_service
    container_name: yelp-review-service
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8004:8004"
    environment:
      MONGO_URL: mongodb://mongodb:27017
      DATABASE_NAME: yelp_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SECRET_KEY: ${SECRET_KEY:-your_super_secret_key_change_this_in_production}
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - yelp-network

  # ── Review Worker (Kafka consumer) ─────────────────────────────────────────
  review-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.review_worker
    container_name: yelp-review-worker
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      MONGO_URL: mongodb://mongodb:27017
      DATABASE_NAME: yelp_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    networks:
      - yelp-network

  # ── Restaurant Worker (Kafka consumer) ─────────────────────────────────────
  restaurant-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.restaurant_worker
    container_name: yelp-restaurant-worker
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      MONGO_URL: mongodb://mongodb:27017
      DATABASE_NAME: yelp_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    networks:
      - yelp-network

  # ── User Worker (Kafka consumer) ───────────────────────────────────────────
  user-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.user_worker
    container_name: yelp-user-worker
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      MONGO_URL: mongodb://mongodb:27017
      DATABASE_NAME: yelp_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    networks:
      - yelp-network

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    container_name: yelp-frontend
    restart: unless-stopped
    depends_on:
      - user-service
      - owner-service
      - restaurant-service
      - review-service
    ports:
      - "3000:80"
    networks:
      - yelp-network

volumes:
  mongo_data:

networks:
  yelp-network:
    driver: bridge
